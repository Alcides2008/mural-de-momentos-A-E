<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Álbum Infinito</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>Nosso Amor ❤️</h1>
        <div id="timer">Contando cada segundo...</div>
    </header>

    <main>
        <section id="add-moment">
            <h2>Novo Momento</h2>
            <form id="moment-form">
                <input type="text" id="title" placeholder="O que aconteceu?" required>
                <input type="date" id="date" required>
                <textarea id="description" placeholder="Escreva uma legenda..."></textarea>
                
                <label for="image-input" class="file-label">📸 Selecionar Foto</label>
                <input type="file" id="image-input" accept="image/*" required>
                
                <button type="submit">Guardar para Sempre</button>
            </form>
        </section>

        <div class="divider">✨ Nossas Memórias ✨</div>

        <section id="gallery">
            <div id="moments-container"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
